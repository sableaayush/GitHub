<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aayush's Web Page New</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #f5f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 3rem 2rem;
    }

    .emoji {
      font-size: 48px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 36px;
      font-weight: 500;
      color: #5a4a3a;
      margin: 0 0 1rem;
    }

    p {
      font-size: 17px;
      color: #7a6a5a;
      line-height: 1.7;
      margin: 0 0 2rem;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #5a4a3a;
      color: #f5f0e8;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-secondary {
      background: transparent;
      color: #5a4a3a;
      border: 1.5px solid #5a4a3a;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">👋</div>
    <h1>Welcome to Aayush's Web Page</h1>
    <p>Hello there! Glad you stopped by. Explore, enjoy, and make yourself at home.</p>
    <div class="buttons">
      <button class="btn-primary">About Me</button>
      <button class="btn-secondary">Contact</button>
    </div>
  </div>
</body>
</html>
